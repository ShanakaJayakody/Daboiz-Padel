<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <title>Padel — The Group Chat Ladder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap">
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0a0a0b; }
    body { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; min-height: 100vh; min-height: 100dvh; color: #f5f5f4; }
    #root { min-height: 100vh; min-height: 100dvh; }
    .boot {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; color: #D4FF3D;
      font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 4px;
      animation: bootpulse 1.5s ease-in-out infinite;
    }
    @keyframes bootpulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div id="root"><div class="boot">PADEL</div></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

// ---- Config ----
const PLAYERS = ['Shanaka', 'Vidhur', 'Minhaz', 'Ayeed', 'Nirmal', 'Luwindu', 'Nipuna', 'Zemar', 'Varun'];
const INITIAL_POINTS = 0;
const BASE_POINTS = 10;
const STRENGTH_FLOOR = 0.5;
const STRENGTH_CEIL = 2.0;

const SUPABASE_URL = 'https://yhwnumvqvdixnbcejkkw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_V13Z2BB4rwWDpNeok90tlA_NjaiygsR';
const SUPABASE_TABLE = 'padel_state';
const ROW_ID = 'main';
const POLL_INTERVAL_MS = 15000;

// ---- Helpers ----
function freshState() {
  const players = {};
  PLAYERS.forEach(p => { players[p] = { points: INITIAL_POINTS, wins: 0, losses: 0 }; });
  return { players, games: [] };
}

function marginMultiplier(winnerScore, loserScore) {
  if (!winnerScore || winnerScore <= 0) return 1;
  const diff = Math.max(0, winnerScore - loserScore);
  return Math.min(2, 1 + diff / winnerScore);
}

// Strength: more points for beating stronger teams, fewer for stomping weaker ones.
// diff = loserTeamPoints - winnerTeamPoints (positive when winners are underdogs)
function strengthMultiplier(diff) {
  return Math.max(STRENGTH_FLOOR, Math.min(STRENGTH_CEIL, 1 + diff / 100));
}

// Compute current win streak for a player (consecutive wins, only counting their games)
function getStreak(playerName, games) {
  let streak = 0;
  for (let i = games.length - 1; i >= 0; i--) {
    const g = games[i];
    const isWinner = g.winners.includes(playerName);
    const isLoser = g.losers.includes(playerName);
    if (!isWinner && !isLoser) continue;
    if (isWinner) streak++;
    else break;
  }
  return streak;
}

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  const diffHr = Math.floor(diffMs / 3600000);
  const diffDay = Math.floor(diffMs / 86400000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return `${diffMin}m ago`;
  if (diffHr < 24) return `${diffHr}h ago`;
  if (diffDay < 7) return `${diffDay}d ago`;
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
}

function rankColor(rank) {
  if (rank === 1) return { bg: '#fbbf24', text: '#0a0a0b' }; // gold
  if (rank === 2) return { bg: '#d4d4d8', text: '#0a0a0b' }; // silver
  if (rank === 3) return { bg: '#c2410c', text: '#fef3c7' }; // bronze
  return { bg: '#26262b', text: '#a1a1aa' };
}

// ---- Supabase REST ----
const SUPABASE_HEADERS = {
  'apikey': SUPABASE_KEY,
  'Content-Type': 'application/json',
};

async function supabaseFetch() {
  const url = `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${ROW_ID}&select=data`;
  const r = await fetch(url, { headers: SUPABASE_HEADERS });
  if (!r.ok) {
    const text = await r.text().catch(() => '');
    throw new Error(`HTTP ${r.status}: ${text.slice(0, 100)}`);
  }
  const rows = await r.json();
  return rows[0]?.data || null;
}

async function supabasePush(data) {
  const url = `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?on_conflict=id`;
  const r = await fetch(url, {
    method: 'POST',
    headers: { ...SUPABASE_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({ id: ROW_ID, data }),
  });
  if (!r.ok) {
    const text = await r.text().catch(() => '');
    throw new Error(`HTTP ${r.status}: ${text.slice(0, 100)}`);
  }
  return true;
}

// ---- Main App ----
function App() {
  const [state, setState] = useState(null);
  const [tab, setTab] = useState('ranks');
  const [loading, setLoading] = useState(true);
  const [syncStatus, setSyncStatus] = useState('synced'); // 'synced' | 'saving' | 'failed'
  const [lastError, setLastError] = useState(null);
  const [storageAvailable, setStorageAvailable] = useState(true);
  const [toast, setToast] = useState(null);
  const [detailPlayer, setDetailPlayer] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [showExport, setShowExport] = useState(false);

  // Load fonts + initial data + polling
  useEffect(() => {
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap';
    document.head.appendChild(link);

    loadState();

    // Pull fresh data on focus and periodically while visible.
    // Skips when a save is in flight (avoids overwriting the user's mid-action state).
    let pollTimer = null;
    async function silentRefresh() {
      try {
        const data = await supabaseFetch();
        if (data && data.players) {
          PLAYERS.forEach(p => {
            if (!data.players[p]) data.players[p] = { points: INITIAL_POINTS, wins: 0, losses: 0 };
          });
          if (!Array.isArray(data.games)) data.games = [];
          // Only swap in if it's actually different — avoid needless re-renders
          setState(prev => {
            if (!prev) return data;
            const a = JSON.stringify(prev);
            const b = JSON.stringify(data);
            return a === b ? prev : data;
          });
        }
      } catch (e) {
        // Silent — don't disturb UI on background refresh failures
        console.warn('Background refresh failed:', e?.message);
      }
    }

    function startPoll() {
      if (pollTimer) return;
      pollTimer = setInterval(() => {
        if (document.visibilityState === 'visible') silentRefresh();
      }, POLL_INTERVAL_MS);
    }
    function stopPoll() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    const onFocus = () => { silentRefresh(); startPoll(); };
    const onBlur = () => stopPoll();
    const onVisibility = () => {
      if (document.visibilityState === 'visible') { silentRefresh(); startPoll(); }
      else stopPoll();
    };

    window.addEventListener('focus', onFocus);
    window.addEventListener('blur', onBlur);
    document.addEventListener('visibilitychange', onVisibility);
    startPoll();

    return () => {
      window.removeEventListener('focus', onFocus);
      window.removeEventListener('blur', onBlur);
      document.removeEventListener('visibilitychange', onVisibility);
      stopPoll();
    };
  }, []);

  async function loadState() {
    if (typeof fetch === 'undefined') {
      setStorageAvailable(false);
      setLastError('fetch API not available');
      setState(freshState());
      setLoading(false);
      return;
    }
    try {
      const data = await supabaseFetch();
      if (data && data.players) {
        PLAYERS.forEach(p => {
          if (!data.players[p]) data.players[p] = { points: INITIAL_POINTS, wins: 0, losses: 0 };
        });
        // Ensure games array exists
        if (!Array.isArray(data.games)) data.games = [];
        setState(data);
      } else {
        // Empty row or first load — start fresh
        setState(freshState());
      }
      setSyncStatus('synced');
      setLastError(null);
    } catch (e) {
      console.error('Supabase load failed', e);
      setLastError(`Load failed: ${e?.message || 'unknown'}`);
      setSyncStatus('failed');
      // Still set fresh state so UI is usable
      if (!state) setState(freshState());
    }
    setLoading(false);
  }

  const save = useCallback(async (newState) => {
    setState(newState);
    setSyncStatus('saving');
    let lastErr = null;
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        await supabasePush(newState);
        setSyncStatus('synced');
        setLastError(null);
        return;
      } catch (e) {
        lastErr = e;
        console.error(`Supabase push attempt ${attempt + 1} failed:`, e?.message);
        if (attempt < 2) await new Promise(r => setTimeout(r, 400 * Math.pow(2, attempt)));
      }
    }
    setSyncStatus('failed');
    const msg = lastErr?.message || 'Unknown error';
    setLastError(msg);
    showToast(`Sync failed: ${msg.slice(0, 60)}`, 'error');
  }, []);

  const retrySync = useCallback(async () => {
    if (state) await save(state);
  }, [state, save]);

  function exportState() {
    if (!state) return '';
    try {
      const json = JSON.stringify(state);
      // base64 encode for compactness + safe paste in chat
      const encoded = btoa(unescape(encodeURIComponent(json)));
      return `PADEL:${encoded}`;
    } catch (e) {
      console.error('Export failed', e);
      return '';
    }
  }

  async function copyExport() {
    const code = exportState();
    if (!code) { showToast('Export failed', 'error'); return; }
    try {
      await navigator.clipboard.writeText(code);
      showToast(`Copied! (${code.length} chars) — paste in group chat`);
    } catch (e) {
      // Fallback for clipboard permission issues — show in a modal
      showToast('Clipboard blocked — view in Settings', 'error');
    }
  }

  function importState(code) {
    try {
      const trimmed = (code || '').trim();
      const payload = trimmed.startsWith('PADEL:') ? trimmed.slice(6) : trimmed;
      const json = decodeURIComponent(escape(atob(payload)));
      const parsed = JSON.parse(json);
      if (!parsed || !parsed.players || !Array.isArray(parsed.games)) {
        throw new Error('Invalid format');
      }
      // Make sure all configured players exist
      PLAYERS.forEach(p => {
        if (!parsed.players[p]) parsed.players[p] = { points: INITIAL_POINTS, wins: 0, losses: 0 };
      });
      setState(parsed);
      // Try to persist (won't hurt if storage is broken)
      save(parsed);
      showToast(`Imported ${parsed.games.length} ${parsed.games.length === 1 ? 'game' : 'games'}`);
      return true;
    } catch (e) {
      console.error('Import failed', e);
      showToast(`Import failed: ${e?.message || 'invalid code'}`, 'error');
      return false;
    }
  }

  function showToast(msg, kind = 'success') {
    setToast({ msg, kind });
    setTimeout(() => setToast(null), 2500);
  }

  function logGame(winners, losers, winnerScore, loserScore) {
    const p = state.players;
    const wTeam = (p[winners[0]].points + p[winners[1]].points) / 2;
    const lTeam = (p[losers[0]].points + p[losers[1]].points) / 2;
    const margin = marginMultiplier(winnerScore, loserScore);
    const strength = strengthMultiplier(lTeam - wTeam);
    const pointsAwarded = Math.max(1, Math.round(BASE_POINTS * margin * strength));

    const newPlayers = { ...p };
    winners.forEach(w => {
      newPlayers[w] = {
        ...newPlayers[w],
        points: newPlayers[w].points + pointsAwarded,
        wins: newPlayers[w].wins + 1,
      };
    });
    losers.forEach(l => {
      // Losses are tallied but no points are deducted.
      newPlayers[l] = { ...newPlayers[l], losses: newPlayers[l].losses + 1 };
    });

    const game = {
      id: Date.now(), timestamp: Date.now(),
      winners, losers, pointsAwarded, winnerScore, loserScore, margin, strength,
    };
    const newState = { players: newPlayers, games: [...state.games, game] };
    save(newState);
    showToast(`${winnerScore}-${loserScore} logged · +${pointsAwarded} pts`);
    setTab('ranks');
  }

  function undoGame(gameId) {
    const game = state.games[state.games.length - 1];
    if (!game || game.id !== gameId) return;
    const newPlayers = { ...state.players };
    const pts = game.pointsAwarded;
    game.winners.forEach(w => {
      newPlayers[w] = {
        ...newPlayers[w],
        points: Math.max(0, newPlayers[w].points - pts),
        wins: newPlayers[w].wins - 1,
      };
    });
    game.losers.forEach(l => {
      newPlayers[l] = { ...newPlayers[l], losses: newPlayers[l].losses - 1 };
    });
    const newState = { players: newPlayers, games: state.games.slice(0, -1) };
    save(newState);
    showToast('Last game undone');
  }

  function resetAll() {
    save(freshState());
    setShowSettings(false);
    showToast('Everything reset');
  }

  if (loading || !state) {
    return (
      <div style={styles.loadingScreen}>
        <div style={styles.loadingPulse}>PADEL</div>
      </div>
    );
  }

  return (
    <div style={styles.app}>
      <style>{globalCss}</style>

      {/* Header */}
      <header style={styles.header}>
        <div>
          <div style={styles.headerTitle}>PADEL</div>
          <div style={styles.headerSub}>The Group Chat Ladder</div>
        </div>
        <div style={styles.headerRight}>
          {syncStatus === 'saving' && <div style={styles.savingDot} title="Saving…" />}
          {syncStatus === 'failed' && (
            <button style={styles.retryBtn} onClick={retrySync}>
              <span style={styles.retryDot} />
              RETRY
            </button>
          )}
          <button style={styles.iconBtn} onClick={() => setShowSettings(true)} aria-label="Settings">⚙</button>
        </div>
      </header>

      {/* Sync state banners */}
      {syncStatus === 'failed' && (
        <div style={styles.syncBanner}>
          <div style={styles.syncBannerText}>
            <strong>Couldn't reach the server.</strong> Your last change saved locally. Check your connection and retry, or use Export to back up.
            {lastError && <div style={styles.syncBannerErr}>{lastError}</div>}
          </div>
          <div style={styles.syncBannerBtnCol}>
            <button style={styles.syncBannerBtn} onClick={retrySync}>RETRY</button>
            <button style={styles.syncBannerBtnGhost} onClick={copyExport}>EXPORT</button>
          </div>
        </div>
      )}
      {!storageAvailable && (
        <div style={styles.syncBanner}>
          <div style={styles.syncBannerText}>
            <strong>Network unavailable.</strong> Can't reach the server.
          </div>
        </div>
      )}

      {/* Tab content */}
      <main style={styles.main}>
        {tab === 'ranks' && <RanksTab state={state} onPlayerTap={setDetailPlayer} />}
        {tab === 'log' && <LogTab state={state} onLog={logGame} />}
        {tab === 'stats' && <StatsTab state={state} />}
        {tab === 'history' && <HistoryTab state={state} onUndo={undoGame} />}
      </main>

      {/* Bottom nav */}
      <nav style={styles.nav}>
        <NavBtn label="Ranks" icon="◆" active={tab === 'ranks'} onClick={() => setTab('ranks')} />
        <NavBtn label="Log" icon="+" active={tab === 'log'} onClick={() => setTab('log')} primary />
        <NavBtn label="Stats" icon="≡" active={tab === 'stats'} onClick={() => setTab('stats')} />
        <NavBtn label="History" icon="⌖" active={tab === 'history'} onClick={() => setTab('history')} />
      </nav>

      {/* Toast */}
      {toast && (
        <div style={{ ...styles.toast, background: toast.kind === 'error' ? '#dc2626' : '#1a1a1f' }}>
          {toast.msg}
        </div>
      )}

      {/* Modals */}
      {detailPlayer && <PlayerDetailModal player={detailPlayer} state={state} onClose={() => setDetailPlayer(null)} />}
      {showSettings && <SettingsModal onClose={() => setShowSettings(false)} onReset={resetAll} gamesCount={state.games.length} syncStatus={syncStatus} lastError={lastError} onRetry={retrySync} onExport={() => { setShowSettings(false); setShowExport(true); }} onImport={() => { setShowSettings(false); setShowImport(true); }} />}
      {showImport && <ImportModal onClose={() => setShowImport(false)} onImport={importState} />}
      {showExport && <ExportModal onClose={() => setShowExport(false)} code={exportState()} />}
    </div>
  );
}

// ---- Tabs ----

function RanksTab({ state, onPlayerTap }) {
  const { active, dormant } = useMemo(() => {
    const all = PLAYERS.map(name => ({ name, ...state.players[name] }));
    const a = all.filter(p => (p.wins + p.losses) > 0).sort((x, y) => y.points - x.points);
    const d = all.filter(p => (p.wins + p.losses) === 0);
    return { active: a, dormant: d };
  }, [state]);

  const totalGames = state.games.length;

  return (
    <div style={styles.tabPad}>
      <div style={styles.sectionMeta}>
        <span>{active.length} active</span>
        <span>·</span>
        <span>{totalGames} {totalGames === 1 ? 'game' : 'games'}</span>
      </div>

      {active.length > 0 ? (
        <div style={styles.rankList}>
          {active.map((p, i) => {
            const rank = i + 1;
            const rc = rankColor(rank);
            const games = p.wins + p.losses;
            const winRate = games > 0 ? Math.round((p.wins / games) * 100) : 0;
            const streak = getStreak(p.name, state.games);
            return (
              <button key={p.name} style={styles.rankCard} onClick={() => onPlayerTap(p.name)}>
                <div style={{ ...styles.rankBadge, background: rc.bg, color: rc.text }}>{rank}</div>
                <div style={styles.rankBody}>
                  <div style={styles.rankNameRow}>
                    <span style={styles.rankName}>{p.name}</span>
                    {streak >= 2 && <span style={styles.streakBadge}>🔥{streak}</span>}
                  </div>
                  <div style={styles.rankMeta}>
                    <span style={styles.winText}>{p.wins}W</span>
                    <span style={styles.divider}>·</span>
                    <span style={styles.lossText}>{p.losses}L</span>
                    <span style={styles.divider}>·</span>
                    <span style={styles.mutedSm}>{winRate}%</span>
                  </div>
                </div>
                <div style={styles.rankElo}>{p.points}</div>
              </button>
            );
          })}
        </div>
      ) : (
        <div style={styles.emptyState}>
          No one's played yet.<br />Be the first to log a game.
        </div>
      )}

      {dormant.length > 0 && (
        <>
          <div style={styles.dormantHeader}>
            <span>YET TO PLAY</span>
            <span style={styles.dormantCount}>{dormant.length}</span>
          </div>
          <div style={styles.dormantList}>
            {dormant.map(p => (
              <button key={p.name} style={styles.dormantCard} onClick={() => onPlayerTap(p.name)}>
                <div style={styles.dormantDot} />
                <div style={styles.dormantName}>{p.name}</div>
                <div style={styles.dormantElo}>{p.points}</div>
              </button>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function LogTab({ state, onLog }) {
  const [slots, setSlots] = useState([null, null, null, null]); // [W1, W2, L1, L2]
  const [activeSlot, setActiveSlot] = useState(0);
  const [winnerScore, setWinnerScore] = useState(0);
  const [loserScore, setLoserScore] = useState(0);

  const used = new Set(slots.filter(Boolean));
  const allFilled = slots.every(Boolean);
  const scoreValid = winnerScore > loserScore;
  const canSubmit = allFilled && scoreValid;

  const preview = useMemo(() => {
    if (!allFilled || !scoreValid) return null;
    const p = state.players;
    const wTeam = (p[slots[0]].points + p[slots[1]].points) / 2;
    const lTeam = (p[slots[2]].points + p[slots[3]].points) / 2;
    const margin = marginMultiplier(winnerScore, loserScore);
    const strength = strengthMultiplier(lTeam - wTeam);
    const pts = Math.max(1, Math.round(BASE_POINTS * margin * strength));
    return { pts, margin, strength };
  }, [slots, allFilled, scoreValid, winnerScore, loserScore, state]);

  function assignToSlot(name) {
    if (used.has(name)) {
      const idx = slots.indexOf(name);
      const next = [...slots];
      next[idx] = null;
      setSlots(next);
      setActiveSlot(idx);
      return;
    }
    const next = [...slots];
    next[activeSlot] = name;
    setSlots(next);
    const nextEmpty = next.findIndex(s => !s);
    if (nextEmpty !== -1) setActiveSlot(nextEmpty);
  }

  function clearSlot(i) {
    const next = [...slots];
    next[i] = null;
    setSlots(next);
    setActiveSlot(i);
  }

  function handleSubmit() {
    if (!canSubmit) return;
    onLog([slots[0], slots[1]], [slots[2], slots[3]], winnerScore, loserScore);
    setSlots([null, null, null, null]);
    setActiveSlot(0);
    setWinnerScore(0);
    setLoserScore(0);
  }

  return (
    <div style={styles.tabPad}>
      <div style={styles.logSection}>
        <div style={styles.logLabel}><span style={styles.logLabelDotW} />WINNERS</div>
        <div style={styles.slotRow}>
          <Slot value={slots[0]} active={activeSlot === 0} onTap={() => setActiveSlot(0)} onClear={() => clearSlot(0)} kind="win" />
          <Slot value={slots[1]} active={activeSlot === 1} onTap={() => setActiveSlot(1)} onClear={() => clearSlot(1)} kind="win" />
        </div>
      </div>

      <div style={styles.logSection}>
        <div style={styles.logLabel}><span style={styles.logLabelDotL} />LOSERS</div>
        <div style={styles.slotRow}>
          <Slot value={slots[2]} active={activeSlot === 2} onTap={() => setActiveSlot(2)} onClear={() => clearSlot(2)} kind="loss" />
          <Slot value={slots[3]} active={activeSlot === 3} onTap={() => setActiveSlot(3)} onClear={() => clearSlot(3)} kind="loss" />
        </div>
      </div>

      <div style={styles.pickerLabel}>
        {used.size < 4 ? `Tap a player for slot ${activeSlot + 1}` : 'All slots filled'}
      </div>
      <div style={styles.playerGrid}>
        {PLAYERS.map(name => {
          const isUsed = used.has(name);
          const slotIdx = slots.indexOf(name);
          const isWinner = slotIdx === 0 || slotIdx === 1;
          return (
            <button
              key={name}
              style={{
                ...styles.playerChip,
                ...(isUsed ? (isWinner ? styles.playerChipWin : styles.playerChipLoss) : {}),
              }}
              onClick={() => assignToSlot(name)}
            >
              {name}
            </button>
          );
        })}
      </div>

      <div style={styles.scoreSection}>
        <div style={styles.pickerLabel}>FINAL SCORE (games won)</div>
        <div style={styles.scoreRow}>

function StatsTab({ state }) {
  const [view, setView] = useState('h2h');
  const [focusPlayer, setFocusPlayer] = useState(PLAYERS[0]);

  const h2h = useMemo(() => {
    // h2h[A][B] = times A beat B
    const m = {};
    PLAYERS.forEach(a => { m[a] = {}; PLAYERS.forEach(b => { m[a][b] = 0; }); });
    state.games.forEach(g => {
      g.winners.forEach(w => g.losers.forEach(l => { m[w][l]++; }));
    });
    return m;
  }, [state]);

  const partnerships = useMemo(() => {
    const map = {};
    function key(a, b) { return [a, b].sort().join('|'); }
    state.games.forEach(g => {
      const wk = key(g.winners[0], g.winners[1]);
      const lk = key(g.losers[0], g.losers[1]);
      if (!map[wk]) map[wk] = { pair: wk.split('|'), wins: 0, losses: 0 };
      if (!map[lk]) map[lk] = { pair: lk.split('|'), wins: 0, losses: 0 };
      map[wk].wins++;
      map[lk].losses++;
    });
    return Object.values(map)
      .map(p => ({ ...p, games: p.wins + p.losses, winRate: p.wins / (p.wins + p.losses) }))
      .sort((a, b) => {
        if (b.winRate !== a.winRate) return b.winRate - a.winRate;
        return b.games - a.games;
      });
  }, [state]);

  return (
    <div style={styles.tabPad}>
      <div style={styles.segmented}>
        <button
          style={{ ...styles.segBtn, ...(view === 'h2h' ? styles.segBtnActive : {}) }}
          onClick={() => setView('h2h')}
        >HEAD-TO-HEAD</button>
        <button
          style={{ ...styles.segBtn, ...(view === 'pairs' ? styles.segBtnActive : {}) }}
          onClick={() => setView('pairs')}
        >PARTNERSHIPS</button>
      </div>

      {view === 'h2h' && (
        <div>
          <div style={styles.h2hPickerLabel}>SHOWING</div>
          <div style={styles.h2hPicker}>
            {PLAYERS.map(p => (
              <button
                key={p}
                onClick={() => setFocusPlayer(p)}
                style={{
                  ...styles.h2hChip,
                  ...(focusPlayer === p ? styles.h2hChipActive : {}),
                }}
              >{p}</button>
            ))}
          </div>
          <div style={styles.h2hList}>
            {PLAYERS.filter(p => p !== focusPlayer)
              .map(opp => ({ name: opp, won: h2h[focusPlayer][opp], lost: h2h[opp][focusPlayer] }))
              .sort((a, b) => (b.won + b.lost) - (a.won + a.lost))
              .map(row => {
                const total = row.won + row.lost;
                return (
                  <div key={row.name} style={styles.h2hRow}>
                    <div style={styles.h2hOpp}>vs {row.name}</div>
                    <div style={styles.h2hScores}>
                      <span style={styles.winText}>{row.won}</span>
                      <span style={styles.h2hDash}>—</span>
                      <span style={styles.lossText}>{row.lost}</span>
                    </div>
                    <div style={styles.h2hBar}>
                      {total > 0 ? (
                        <>
                          <div style={{ ...styles.h2hBarWin, flex: row.won }} />
                          <div style={{ ...styles.h2hBarLoss, flex: row.lost }} />
                        </>
                      ) : (
                        <div style={styles.h2hBarEmpty}>no games yet</div>
                      )}
                    </div>
                  </div>
                );
              })}
          </div>
        </div>
      )}

      {view === 'pairs' && (
        <div style={styles.pairsList}>
          {partnerships.length === 0 && (
            <div style={styles.emptyState}>No games logged yet — log some to see the best partnerships.</div>
          )}
          {partnerships.map((p, i) => (
            <div key={p.pair.join('|')} style={styles.pairRow}>
              <div style={styles.pairRank}>{i + 1}</div>
              <div style={styles.pairBody}>
                <div style={styles.pairNames}>{p.pair[0]} & {p.pair[1]}</div>
                <div style={styles.pairMeta}>
                  <span style={styles.winText}>{p.wins}W</span>
                  <span style={styles.divider}>·</span>
                  <span style={styles.lossText}>{p.losses}L</span>
                  <span style={styles.divider}>·</span>
                  <span style={styles.mutedSm}>{p.games} {p.games === 1 ? 'game' : 'games'}</span>
                </div>
              </div>
              <div style={styles.pairWinRate}>{Math.round(p.winRate * 100)}%</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function PlayerDetailModal({ player, state, onClose }) {
  const p = state.players[player];
  const games = p.wins + p.losses;
  const winRate = games > 0 ? Math.round((p.wins / games) * 100) : 0;

  // Best partner & worst opponent
  const partners = {};
  const oppRecord = {};
  state.games.forEach(g => {
    const isWinner = g.winners.includes(player);
    const isLoser = g.losers.includes(player);
    if (!isWinner && !isLoser) return;
    const teammates = isWinner ? g.winners.filter(x => x !== player) : g.losers.filter(x => x !== player);
    const opponents = isWinner ? g.losers : g.winners;
    teammates.forEach(t => {
      if (!partners[t]) partners[t] = { wins: 0, losses: 0 };
      if (isWinner) partners[t].wins++; else partners[t].losses++;
    });
    opponents.forEach(o => {
      if (!oppRecord[o]) oppRecord[o] = { wins: 0, losses: 0 };
      if (isWinner) oppRecord[o].wins++; else oppRecord[o].losses++;
    });
  });

  const partnerList = Object.entries(partners)
    .map(([n, r]) => ({ name: n, ...r, games: r.wins + r.losses, rate: r.wins / (r.wins + r.losses) }))
    .sort((a, b) => b.rate - a.rate || b.games - a.games);

  const oppList = Object.entries(oppRecord)
    .map(([n, r]) => ({ name: n, ...r, games: r.wins + r.losses, rate: r.wins / (r.wins + r.losses) }))
    .sort((a, b) => b.rate - a.rate || b.games - a.games);

  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalSheet} onClick={e => e.stopPropagation()}>
        <div style={styles.modalGrabber} />
        <div style={styles.modalHead}>
          <div>
            <div style={styles.modalName}>{player}</div>
            <div style={styles.modalMetaLine}>
              <span style={styles.winText}>{p.wins}W</span>
              <span style={styles.divider}>·</span>
              <span style={styles.lossText}>{p.losses}L</span>
              {games > 0 && (<><span style={styles.divider}>·</span><span>{winRate}% win rate</span></>)}
            </div>
          </div>
          <div style={styles.modalElo}>{p.points}</div>
        </div>

        {partnerList.length > 0 && (
          <div style={styles.modalSection}>
            <div style={styles.modalSectionTitle}>PARTNERS</div>
            {partnerList.map(t => (
              <div key={t.name} style={styles.modalRow}>
                <span>{t.name}</span>
                <span style={styles.mutedSm}>
                  <span style={styles.winText}>{t.wins}W</span>
                  {' / '}
                  <span style={styles.lossText}>{t.losses}L</span>
                </span>
              </div>
            ))}
          </div>
        )}

        {oppList.length > 0 && (
          <div style={styles.modalSection}>
            <div style={styles.modalSectionTitle}>VS OPPONENTS</div>
            {oppList.map(t => (
              <div key={t.name} style={styles.modalRow}>
                <span>{t.name}</span>
                <span style={styles.mutedSm}>
                  <span style={styles.winText}>{t.wins}W</span>
                  {' / '}
                  <span style={styles.lossText}>{t.losses}L</span>
                </span>
              </div>
            ))}
          </div>
        )}

        {games === 0 && (
          <div style={styles.emptyState}>No games yet for {player}.</div>
        )}

        <button style={styles.modalClose} onClick={onClose}>CLOSE</button>
      </div>
    </div>
  );
}

function ExportModal({ onClose, code }) {
  const [copied, setCopied] = useState(false);
  async function doCopy() {
    try {
      await navigator.clipboard.writeText(code);
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    } catch (e) {
      // ignore, user can manually select
    }
  }
  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalSheet} onClick={e => e.stopPropagation()}>
        <div style={styles.modalGrabber} />
        <div style={styles.modalHead}>
          <div style={styles.modalName}>EXPORT</div>
        </div>
        <div style={styles.settingsNote}>
          Copy this code, paste in the group chat. Anyone can open the link and tap Import to load it.
        </div>
        <textarea
          value={code}
          readOnly
          style={styles.codeBox}
          onFocus={e => e.target.select()}
        />
        <div style={styles.exportMeta}>{code.length} characters</div>
        <button style={styles.submitBtn} onClick={doCopy}>{copied ? 'COPIED ✓' : 'COPY TO CLIPBOARD'}</button>
        <button style={{ ...styles.modalClose, marginTop: 12 }} onClick={onClose}>CLOSE</button>
      </div>
    </div>
  );
}

function ImportModal({ onClose, onImport }) {
  const [code, setCode] = useState('');
  const [confirming, setConfirming] = useState(false);
  function handleImport() {
    if (!code.trim()) return;
    if (onImport(code)) {
      onClose();
    }
  }
  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalSheet} onClick={e => e.stopPropagation()}>
        <div style={styles.modalGrabber} />
        <div style={styles.modalHead}>
          <div style={styles.modalName}>IMPORT</div>
        </div>
        <div style={styles.settingsNote}>
          Paste an export code below. This will replace all current data.
        </div>
        <textarea
          value={code}
          onChange={e => setCode(e.target.value)}
          placeholder="PADEL:..."
          style={styles.codeBox}
          autoFocus
        />
        {!confirming ? (
          <button
            style={{ ...styles.submitBtn, ...(code.trim() ? {} : styles.submitBtnDisabled) }}
            onClick={() => code.trim() && setConfirming(true)}
            disabled={!code.trim()}
          >IMPORT</button>
        ) : (
          <div>
            <div style={styles.confirmText}>This replaces all current data. Continue?</div>
            <div style={styles.confirmRow}>
              <button style={styles.modalClose} onClick={() => setConfirming(false)}>CANCEL</button>
              <button style={styles.dangerBtnConfirm} onClick={handleImport}>YES, IMPORT</button>
            </div>
          </div>
        )}
        <button style={{ ...styles.modalClose, marginTop: 12 }} onClick={onClose}>CLOSE</button>
      </div>
    </div>
  );
}
