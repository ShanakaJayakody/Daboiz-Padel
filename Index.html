// Animation keyframes (injected globally)
if (typeof document !== 'undefined' && !document.getElementById('padel-keyframes')) {
  const style = document.createElement('style');
  style.id = 'padel-keyframes';
  style.textContent = `
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  `;
  document.head.appendChild(style);
}


// Mount with error trap
try {
  const _root = ReactDOM.createRoot(document.getElementById('root'));
  _root.render(React.createElement(App));
} catch (err) {
  document.getElementById('root').innerHTML =
    '<div class="boot"><div class="boot-error">' +
    'App failed to start.<br><br>' +
    '<span style="font-family:monospace;font-size:11px;color:#fda4af;">' +
    (err.message || String(err)).replace(/[<>]/g, '') +
    '</span>' +
    '</div></div>';
  console.error('Mount error:', err);
}
